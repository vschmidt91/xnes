name: CI

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run checks
        run: make check

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.release.outputs.created }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package version
        id: version
        run: |
          version=$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Decide whether to create a release tag
        id: release
        env:
          BEFORE_SHA: ${{ github.event.before }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE_SHA:pyproject.toml" 2>/dev/null; then
            previous_version=$(git show "$BEFORE_SHA:pyproject.toml" | python -c "import sys, tomllib; print(tomllib.loads(sys.stdin.read())['project']['version'])")
          else
            previous_version=""
          fi

          if [ "$previous_version" = "$VERSION" ]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Release tag $TAG already exists." >&2
            exit 1
          fi

          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.release.outputs.created == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  publish:
    if: needs.tag.outputs.created == 'true'
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
